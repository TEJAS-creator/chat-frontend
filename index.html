<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Lite Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter a room code to spin up a server channel</p>
            <input type="text" id="username" placeholder="Your Name" autocomplete="off">
            <input type="text" id="room-code" placeholder="Room Code" autocomplete="off">
            <div class="btn-group">
                <button id="btn-join" onclick="initChat(false)">Join Room</button>
                <button id="btn-host" onclick="initChat(true)" class="btn-secondary">Host Room</button>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="container hidden">
        <div class="chat-header">
            <div class="header-meta">
                <span class="hashtag">#</span>
                <span id="display-room">--</span>
                <span id="host-badge" class="badge hidden">HOST</span>
            </div>
            <div class="header-controls">
                <button id="btn-leave-action" onclick="leaveRoom()" class="btn-control text-link" title="Leave Room">Leave</button>
                <button id="btn-stop-action" onclick="stopRoom()" class="btn-control text-danger hidden" title="Terminate Server Entirely">Stop Room</button>
            </div>
        </div>
        
        <div id="chat-messages" class="chat-messages"></div>
        
        <div class="chat-input-area">
            <label for="image-input" class="file-label">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </label>
            <input type="file" id="image-input" accept="image/*" style="display: none;">
            <input type="text" id="message-input" placeholder="Message room..." autocomplete="off">
            <button id="btn-send" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
